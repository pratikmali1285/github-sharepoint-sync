name: Sync SharePoint Docs

on:
  schedule:
    - cron: "*/2 * * * *"   # every 6 hours (UTC)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write             # needed to commit

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_SITE_ID:  ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER:   "Documentation"   # adjust or remove
          DEST_DIR:            "docs"
        run: python scripts/sync_sharepoint.py

      - name: Commit and push changes
        run: |
          git config user.name  "sharepoint-sync-bot"
          git config user.email "actions@github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync SharePoint docs ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
